<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moormix Digital - Catálogo Personalizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .option-btn[data-selected="true"] {
            background-color: #0891b2;
            color: white;
            border-color: #0891b2;
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center cursor-pointer" id="btn-inicio">
                    <span class="text-2xl font-bold text-cyan-600">MOORMIX</span>
                    <span class="text-2xl font-light text-gray-500 ml-1">DIGITAL</span>
                </div>
                <div class="hidden md:flex space-x-8">
                    <button id="btn-catalogo" class="text-gray-600 hover:text-cyan-600 font-medium">Catálogo</button>
                    <button id="btn-nosotros" class="text-gray-600 hover:text-cyan-600 font-medium">Nosotros</button>
                    <button id="btn-contacto" class="text-gray-600 hover:text-cyan-600 font-medium text-white bg-cyan-600 px-4 py-2 rounded-lg">Contacto</button>
                </div>
                <button id="menu-toggle" class="md:hidden text-gray-600"><i class="fas fa-bars text-2xl"></i></button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t px-4 py-4 space-y-4">
            <button class="block w-full text-left py-2" onclick="showPage('page-inicio')">Inicio</button>
            <button class="block w-full text-left py-2" onclick="showPage('page-catalogo')">Catálogo</button>
            <button class="block w-full text-left py-2" onclick="showPage('page-contacto')">Contacto</button>
        </div>
    </nav>

    <main id="page-inicio" class="content-page">
        <section class="relative h-[500px] flex items-center justify-center text-center text-white">
            <div class="absolute inset-0 bg-black opacity-50 z-10"></div>
            <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&q=80')] bg-cover bg-center"></div>
            <div class="relative z-20 px-4">
                <h1 class="text-5xl font-extrabold mb-4">Tecnología a tu Alcance</h1>
                <p class="text-xl mb-8 max-w-2xl mx-auto">Equipos de última generación con planes de financiamiento directos y personalizados.</p>
                <button id="btn-ir-catalogo" class="bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-4 px-8 rounded-full text-lg transition-all transform hover:scale-105">
                    VER CATÁLOGO AHORA
                </button>
            </div>
        </section>
    </main>

    <main id="page-catalogo" class="content-page hidden max-w-7xl mx-auto px-4 py-10">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <h2 class="text-3xl font-bold text-gray-800">Nuestros Equipos</h2>
            <div class="flex gap-2 w-full md:w-auto">
                <input type="text" id="search-input" placeholder="Buscar modelo..." class="border p-2 rounded-lg w-full md:w-64 focus:ring-2 focus:ring-cyan-500 outline-none">
                <select id="sort-order" class="border p-2 rounded-lg outline-none">
                    <option value="name">Nombre</option>
                    <option value="price">Menor Precio</option>
                </select>
            </div>
        </div>
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </main>

    <main id="page-contacto" class="content-page hidden max-w-4xl mx-auto px-4 py-20 text-center">
        <h2 class="text-3xl font-bold mb-6">¿Tienes dudas?</h2>
        <form id="contact-form" class="bg-white p-8 rounded-xl shadow-lg space-y-4">
            <input type="text" id="name" placeholder="Tu nombre" required class="w-full border p-3 rounded-lg">
            <input type="email" id="email" placeholder="Correo electrónico" required class="w-full border p-3 rounded-lg">
            <textarea id="message" placeholder="Mensaje o sugerencia" class="w-full border p-3 rounded-lg h-32"></textarea>
            <button type="submit" class="w-full bg-cyan-600 text-white font-bold py-3 rounded-lg hover:bg-cyan-700 transition">Enviar Mensaje</button>
            <p id="form-message" class="hidden font-medium mt-4"></p>
        </form>
    </main>

    <div id="info-modal" class="fixed inset-0 bg-black bg-opacity-70 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-5xl max-h-[90vh] overflow-y-auto relative shadow-2xl">
            <button id="close-modal" class="absolute top-4 right-4 text-gray-500 hover:text-black text-3xl z-10">&times;</button>
            <div id="modal-content-inner" class="p-6 md:p-10">
                </div>
        </div>
    </div>

    <script>
        // *************************************************************
        // * BASE DE DATOS DE PRODUCTOS (CONFIGURACIÓN POR PROVEEDOR)
        // *************************************************************
        const products = [
            {
                id: 1,
                name: "iPhone 15 Pro",
                shortDescription: "Titanio, Chip A17 Pro.",
                longDescription: "El iPhone 15 Pro es el primer iPhone con diseño de titanio de calidad aeroespacial. El chip A17 Pro ofrece el mejor rendimiento gráfico hasta la fecha.",
                specs: ["Pantalla Super Retina XDR 6.1\"", "Chip A17 Pro", "Cámara Pro 48MP", "USB-C"],
                image: "https://images.unsplash.com/photo-1696446701796-da61225697cc?auto=format&fit=crop&q=80",
                variants: [
                    { 
                        almacenamiento: "128GB", ram: "8GB", color: "Titanio", stock: 5,
                        costoProveedor: 850.00, // <--- TU COSTO
                        margenContado: 1.15,     // <--- 15% de ganancia
                        tasaAnual: 0.25          // <--- 25% de interés anual
                    },
                    { 
                        almacenamiento: "256GB", ram: "8GB", color: "Azul", stock: 3,
                        costoProveedor: 950.00,
                        margenContado: 1.15,
                        tasaAnual: 0.22 
                    }
                ]
            },
            {
                id: 2,
                name: "Samsung Galaxy S24 Ultra",
                shortDescription: "Galaxy AI ha llegado.",
                longDescription: "Potencia tu creatividad y productividad con la inteligencia artificial integrada. Cámara de 200MP y S-Pen incluido.",
                specs: ["Pantalla Dynamic AMOLED 6.8\"", "Snapdragon 8 Gen 3", "S-Pen Integrado", "Batería 5000mAh"],
                image: "https://images.unsplash.com/photo-1707230559036-39149298586d?auto=format&fit=crop&q=80",
                variants: [
                    { 
                        almacenamiento: "256GB", ram: "12GB", color: "Negro", stock: 8,
                        costoProveedor: 900.00,
                        margenContado: 1.12,    // <--- Margen diferente para Samsung
                        tasaAnual: 0.30         // <--- Tasa diferente
                    }
                ]
            }
        ];

        // *************************************************************
        // * LÓGICA DE CÁLCULO FINANCIERO PERSONALIZADO
        // *************************************************************
        function calculatePayment(precioBase, meses, frecuencia, tasaAnual) {
            // Interés simple aplicado al total (puedes cambiar a interés compuesto si prefieres)
            const interesTotal = precioBase * (tasaAnual * (meses / 12));
            const totalFinanciado = precioBase + interesTotal;
            
            let divisor = 1;
            if (frecuencia === 'quincenal') divisor = 2;
            if (frecuencia === 'semanal') divisor = 4;
            
            const totalPagos = meses * divisor;
            const valorCuota = totalFinanciado / totalPagos;

            return {
                totalAmountDue: totalFinanciado.toFixed(2),
                installmentAmount: valorCuota.toFixed(2),
                totalPayments: totalPagos,
                annualRate: (tasaAnual * 100).toFixed(0)
            };
        }

        // *************************************************************
        // * RENDERIZADO Y NAVEGACIÓN
        // *************************************************************
        function showPage(pageId) {
            document.querySelectorAll('.content-page').forEach(p => p.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function renderProducts(items) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = items.map(p => {
                const mainVariant = p.variants[0];
                const precioContado = (mainVariant.costoProveedor * mainVariant.margenContado).toFixed(2);
                return `
                <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-shadow cursor-pointer border border-gray-100" onclick="openModal(${p.id})">
                    <img src="${p.image}" class="h-56 w-full object-cover">
                    <div class="p-5">
                        <h3 class="font-bold text-lg text-gray-800">${p.name}</h3>
                        <p class="text-gray-500 text-sm mb-4">${p.shortDescription}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-cyan-600 font-extrabold text-xl">$${precioContado}</span>
                            <span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">Disponible</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        let currentPaymentMode = 'contado';

        function openModal(productId) {
            const product = products.find(p => p.id === productId);
            const initialVariant = product.variants[0];
            const uniqueAlmacenamiento = [...new Set(product.variants.map(v => v.almacenamiento))];
            const uniqueRAM = [...new Set(product.variants.map(v => v.ram))];
            const uniqueColor = [...new Set(product.variants.map(v => v.color))];

            const modalContent = document.getElementById('modal-content-inner');
            modalContent.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                    <div>
                        <img id="main-modal-img" src="${product.image}" class="w-full rounded-2xl shadow-lg mb-4 h-[400px] object-cover">
                        <div class="flex space-x-2 overflow-x-auto pb-2">
                            <img src="${product.image}" class="w-20 h-20 rounded-lg border-2 border-cyan-500 cursor-pointer object-cover">
                        </div>
                    </div>
                    <div>
                        <h2 class="text-3xl font-bold text-gray-800 mb-2">${product.name}</h2>
                        <div class="flex items-center space-x-2 mb-4">
                            <span class="text-sm text-gray-500">Stock: <span id="modal-stock" class="font-bold text-gray-700">${initialVariant.stock}</span></span>
                        </div>

                        <div class="space-y-4 mb-6">
                            <div>
                                <p class="text-sm font-bold text-gray-600 mb-2">MODALIDAD DE PAGO</p>
                                <div class="flex gap-2">
                                    <button class="payment-mode-btn bg-cyan-600 text-white px-4 py-2 rounded-lg text-sm font-bold" data-payment-mode="contado">CONTADO</button>
                                    <button class="payment-mode-btn bg-white border border-gray-300 px-4 py-2 rounded-lg text-sm font-bold" data-payment-mode="plazos">A PLAZOS (CRÉDITO)</button>
                                </div>
                            </div>

                            <div id="financing-options" class="hidden bg-gray-50 p-4 rounded-xl border border-dashed border-gray-300">
                                <div class="grid grid-cols-2 gap-4 mb-4">
                                    <div>
                                        <label class="text-xs font-bold text-gray-500 uppercase">Frecuencia</label>
                                        <select id="payment-frequency" class="w-full bg-white border p-2 rounded-lg text-sm">
                                            <option value="mensual">Mensual</option>
                                            <option value="quincenal">Quincenal</option>
                                            <option value="semanal">Semanal</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="text-xs font-bold text-gray-500 uppercase">Meses</label>
                                        <select id="payment-months" class="w-full bg-white border p-2 rounded-lg text-sm">
                                            <option value="3">3 Meses</option>
                                            <option value="6" selected>6 Meses</option>
                                            <option value="12">12 Meses</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="text-center bg-cyan-50 p-3 rounded-lg border border-cyan-100">
                                    <p class="text-xs text-cyan-700 font-bold uppercase">Tu Cuota Estimada</p>
                                    <p id="financing-installment-amount" class="text-2xl font-black text-cyan-600">$0.00</p>
                                    <p class="text-[10px] text-cyan-500"><span id="financing-total-payments">0</span> pagos totales</p>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-4 mb-6">
                            ${uniqueAlmacenamiento.length > 1 ? `<div><p class="text-xs font-bold text-gray-500 mb-2">ALMACENAMIENTO</p><div class="flex gap-2">${uniqueAlmacenamiento.map((a, i) => `<button class="option-btn border px-3 py-1 rounded text-sm" data-option-type="almacenamiento" data-option-value="${a}" data-selected="${i===0}">${a}</button>`).join('')}</div></div>` : ''}
                            ${uniqueColor.length > 1 ? `<div><p class="text-xs font-bold text-gray-500 mb-2">COLOR</p><div class="flex gap-2">${uniqueColor.map((c, i) => `<button class="option-btn border px-3 py-1 rounded text-sm" data-option-type="color" data-option-value="${c}" data-selected="${i===0}">${c}</button>`).join('')}</div></div>` : ''}
                        </div>

                        <div class="border-t pt-4 mb-6">
                            <span id="price-label" class="text-sm font-semibold text-gray-700">Precio Total:</span>
                            <span id="modal-price" class="text-4xl font-extrabold text-cyan-600 block">$0.00</span>
                        </div>

                        <div class="flex items-center space-x-4">
                            <div class="flex items-center border rounded-lg">
                                <button id="qty-minus" class="p-3">-</button>
                                <input id="qty-input" type="number" value="1" class="w-10 text-center font-bold">
                                <button id="qty-plus" class="p-3">+</button>
                            </div>
                            <a id="modal-whatsapp-link" href="#" target="_blank" class="flex-1 bg-green-500 text-white font-bold py-4 rounded-xl text-center hover:bg-green-600 transition shadow-lg">
                                <i class="fab fa-whatsapp mr-2"></i> COMPRAR AHORA
                            </a>
                        </div>
                    </div>
                </div>
                <div class="mt-10 border-t pt-6">
                    <div class="flex space-x-4 mb-4 border-b">
                        <button class="tab-btn border-b-2 border-cyan-600 text-cyan-600 pb-2 font-bold uppercase text-sm">Descripción</button>
                        <button class="tab-btn border-b-2 border-transparent text-gray-400 pb-2 font-bold uppercase text-sm">Especificaciones</button>
                    </div>
                    <div id="tab-content" class="text-gray-600 text-sm leading-relaxed">
                        ${product.longDescription}
                    </div>
                </div>
            `;

            // Vincular eventos del modal
            setupModalEvents(product);
            document.getElementById('info-modal').classList.remove('hidden');
            updateModalUI(product);
        }

        function setupModalEvents(product) {
            document.querySelectorAll('.payment-mode-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    currentPaymentMode = e.target.getAttribute('data-payment-mode');
                    document.querySelectorAll('.payment-mode-btn').forEach(b => b.className = "payment-mode-btn bg-white border border-gray-300 px-4 py-2 rounded-lg text-sm font-bold");
                    e.target.className = "payment-mode-btn bg-cyan-600 text-white px-4 py-2 rounded-lg text-sm font-bold";
                    updateModalUI(product);
                });
            });

            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const type = e.target.getAttribute('data-option-type');
                    document.querySelectorAll(`.option-btn[data-option-type="${type}"]`).forEach(b => b.setAttribute('data-selected', 'false'));
                    e.target.setAttribute('data-selected', 'true');
                    updateModalUI(product);
                });
            });

            document.getElementById('qty-plus').onclick = () => { document.getElementById('qty-input').value++; updateModalUI(product); };
            document.getElementById('qty-minus').onclick = () => { if(document.getElementById('qty-input').value > 1) { document.getElementById('qty-input').value--; updateModalUI(product); } };
            document.getElementById('payment-frequency').onchange = () => updateModalUI(product);
            document.getElementById('payment-months').onchange = () => updateModalUI(product);
        }

        function updateModalUI(product) {
            const qty = parseInt(document.getElementById('qty-input').value);
            const alm = document.querySelector('.option-btn[data-option-type="almacenamiento"][data-selected="true"]')?.getAttribute('data-option-value') || product.variants[0].almacenamiento;
            const col = document.querySelector('.option-btn[data-option-type="color"][data-selected="true"]')?.getAttribute('data-option-value') || product.variants[0].color;
            
            const variant = product.variants.find(v => v.almacenamiento === alm && v.color === col) || product.variants[0];
            const precioBaseVenta = variant.costoProveedor * variant.margenContado;

            const modalPrice = document.getElementById('modal-price');
            const finOptions = document.getElementById('financing-options');
            const waLink = document.getElementById('modal-whatsapp-link');

            let msg = "";

            if (currentPaymentMode === 'contado') {
                finOptions.classList.add('hidden');
                const total = (precioBaseVenta * qty).toFixed(2);
                modalPrice.textContent = `$${total}`;
                msg = `Hola Moormix Digital, me interesa comprar al CONTADO ${qty} unidad(es) de ${product.name} (${alm}, ${col}). Total: $${total}`;
            } else {
                finOptions.classList.remove('hidden');
                const months = document.getElementById('payment-months').value;
                const freq = document.getElementById('payment-frequency').value;
                
                const calc = calculatePayment(precioBaseVenta * qty, months, freq, variant.tasaAnual);
                
                modalPrice.textContent = `$${calc.totalAmountDue}`;
                document.getElementById('financing-installment-amount').textContent = `$${calc.installmentAmount}`;
                document.getElementById('financing-total-payments').textContent = calc.totalPayments;
                msg = `Hola, me interesa FINANCIAR ${qty} unidad(es) de ${product.name} (${alm}, ${col}). Plan: ${months} meses, pago ${freq}. Cuota: $${calc.installmentAmount}.`;
            }

            waLink.href = `https://wa.me/593967427594?text=${encodeURIComponent(msg)}`;
        }

        // Inicialización
        document.getElementById('close-modal').onclick = () => document.getElementById('info-modal').classList.add('hidden');
        document.getElementById('btn-inicio').onclick = () => showPage('page-inicio');
        document.getElementById('btn-catalogo').onclick = () => showPage('page-catalogo');
        document.getElementById('btn-ir-catalogo').onclick = () => showPage('page-catalogo');
        document.getElementById('btn-nosotros').onclick = () => alert("Sección Nosotros en construcción");
        document.getElementById('btn-contacto').onclick = () => showPage('page-contacto');
        document.getElementById('menu-toggle').onclick = () => document.getElementById('mobile-menu').classList.toggle('hidden');

        document.addEventListener('DOMContentLoaded', () => {
            renderProducts(products);
            showPage('page-inicio');
        });
    </script>
</body>
</html>
