<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moormix Digital - Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center cursor-pointer" id="btn-inicio">
                    <span class="text-3xl font-black text-cyan-600 tracking-tighter">MOORMIX</span>
                    <span class="text-3xl font-light text-gray-400 ml-1">DIGITAL</span>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <button id="btn-catalogo" class="text-gray-600 hover:text-cyan-600 font-bold transition">CATÁLOGO</button>
                    <button id="btn-nosotros" class="text-gray-600 hover:text-cyan-600 font-bold transition">NOSOTROS</button>
                    <button id="btn-contacto" class="bg-cyan-600 text-white px-6 py-2 rounded-full font-bold hover:bg-cyan-700 transition shadow-lg shadow-cyan-200">CONTACTO</button>
                </div>
                <button id="menu-toggle" class="md:hidden text-cyan-600 text-2xl"><i class="fas fa-bars"></i></button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t p-4 space-y-4 shadow-xl">
            <button id="m-btn-inicio" class="block w-full text-left font-bold text-gray-700">INICIO</button>
            <button id="m-btn-catalogo" class="block w-full text-left font-bold text-gray-700">CATÁLOGO</button>
            <button id="m-btn-contacto" class="block w-full text-left font-bold text-cyan-600">CONTACTO</button>
        </div>
    </nav>

    <main id="page-inicio" class="content-page">
        <div class="relative h-[600px] flex items-center overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-r from-black to-transparent z-10 opacity-60"></div>
            <img src="https://images.unsplash.com/photo-1616348436168-de43ad0db179?q=80&w=2000" class="absolute inset-0 w-full h-full object-cover">
            <div class="relative z-20 max-w-7xl mx-auto px-6 text-white">
                <h1 class="text-6xl font-black mb-4 leading-tight">TU PRÓXIMO IPHONE<br><span class="text-cyan-400">ESTÁ AQUÍ.</span></h1>
                <p class="text-xl mb-8 text-gray-200 max-w-xl">Financiamiento directo, sin papeleo excesivo. Estrena hoy mismo con Moormix Digital.</p>
                <button id="btn-ir-catalogo" class="bg-white text-cyan-600 px-10 py-4 rounded-full font-black text-lg hover:bg-cyan-50 transition transform hover:scale-105 shadow-2xl">EXPLORAR EQUIPOS</button>
            </div>
        </div>
    </main>

    <main id="page-catalogo" class="content-page hidden max-w-7xl mx-auto px-4 py-16">
        <div class="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6">
            <div>
                <h2 class="text-4xl font-black text-gray-900 uppercase tracking-tighter">Catálogo <span class="text-cyan-600">Premium</span></h2>
                <p class="text-gray-500 font-medium">Equipos homologados con garantía total.</p>
            </div>
            <div class="flex gap-4 items-center">
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="search-input" placeholder="Buscar modelo..." class="pl-12 pr-4 py-3 bg-white border border-gray-200 rounded-2xl w-full md:w-80 focus:ring-2 focus:ring-cyan-500 outline-none transition shadow-sm">
                </div>
                <select id="sort-order" class="bg-white border border-gray-200 py-3 px-4 rounded-2xl font-bold text-gray-600 outline-none shadow-sm">
                    <option value="name">A-Z</option>
                    <option value="price">PRECIO</option>
                </select>
            </div>
        </div>
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </main>

    <div id="info-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] w-full max-w-5xl max-h-[95vh] overflow-y-auto relative shadow-2xl">
            <button id="close-modal" class="absolute top-6 right-6 text-gray-400 hover:text-black text-3xl z-10 transition">&times;</button>
            
            <div id="modal-content-inner" class="p-4 md:p-12">
                </div>
        </div>
    </div>

    <script>
        // *************************************************************
        // * PRODUCTOS CON COSTOS PERSONALIZADOS
        // *************************************************************
        const products = [
            {
                id: 1,
                name: "iPhone 15 Pro Max",
                shortDescription: "El titanio llega al iPhone.",
                longDescription: "Diseño robusto y ligero de titanio de calidad aeroespacial. Botón de Acción personalizable. El sistema de cámaras más potente en un iPhone.",
                specs: ["Pantalla 6.7\" ProMotion", "Chip A17 Pro", "Cámara Triple 48MP", "USB-C 3.0"],
                image: "https://images.unsplash.com/photo-1696446701796-da61225697cc?q=80&w=1000",
                variants: [
                    { 
                        almacenamiento: "256GB", ram: "8GB", color: "Titanio Natural", stock: 4,
                        costoProveedor: 1050.00, 
                        margenContado: 1.15, // 15% ganancia
                        tasaAnual: 0.28    // 28% interés anual
                    },
                    { 
                        almacenamiento: "512GB", ram: "8GB", color: "Titanio Negro", stock: 2,
                        costoProveedor: 1250.00,
                        margenContado: 1.15,
                        tasaAnual: 0.25
                    }
                ]
            },
            {
                id: 2,
                name: "Samsung S24 Ultra",
                shortDescription: "Inteligencia Artificial Galaxy.",
                longDescription: "Marco de titanio, pantalla plana y el rendimiento que necesitas para jugar y crear contenidos.",
                specs: ["Pantalla 6.8\" QHD+", "Snapdragon 8 Gen 3", "200MP Camera", "S-Pen"],
                image: "https://images.unsplash.com/photo-1707230559036-39149298586d?q=80&w=1000",
                variants: [
                    { 
                        almacenamiento: "256GB", ram: "12GB", color: "Titanium Gray", stock: 6,
                        costoProveedor: 980.00,
                        margenContado: 1.12, 
                        tasaAnual: 0.30 
                    }
                ]
            }
        ];

        // Lógica de cálculo
        function calculatePayment(amount, months, frequency, annualRate) {
            const interest = amount * (annualRate * (months / 12));
            const total = amount + interest;
            let divider = frequency === 'quincenal' ? 2 : (frequency === 'semanal' ? 4 : 1);
            const totalPayments = months * divider;
            return {
                totalAmountDue: total.toFixed(2),
                installmentAmount: (total / totalPayments).toFixed(2),
                totalPayments: totalPayments
            };
        }

        let currentPaymentMode = 'contado';

        function renderProducts(items) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = items.map(p => {
                const v = p.variants[0];
                const price = (v.costoProveedor * v.margenContado).toFixed(2);
                return `
                <div class="group bg-white rounded-[2rem] p-4 shadow-sm hover:shadow-2xl transition-all duration-500 cursor-pointer border border-gray-100" onclick="openModal(${p.id})">
                    <div class="overflow-hidden rounded-[1.5rem] mb-4 h-64">
                        <img src="${p.image}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                    </div>
                    <div class="px-2">
                        <h3 class="font-black text-xl text-gray-800 uppercase tracking-tighter">${p.name}</h3>
                        <p class="text-gray-400 text-sm font-bold mb-4">${p.shortDescription}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-2xl font-black text-cyan-600">$${price}</span>
                            <div class="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center text-cyan-600 group-hover:bg-cyan-600 group-hover:text-white transition">
                                <i class="fas fa-plus"></i>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function openModal(productId) {
            const product = products.find(p => p.id === productId);
            const modalContent = document.getElementById('modal-content-inner');
            const uniqueAlm = [...new Set(product.variants.map(v => v.almacenamiento))];
            const uniqueCol = [...new Set(product.variants.map(v => v.color))];

            modalContent.innerHTML = `
                <div class="flex flex-col lg:flex-row gap-12">
                    <div class="w-full lg:w-1/2">
                        <img id="modal-main-img" src="${product.image}" class="w-full rounded-[2.5rem] shadow-2xl h-[500px] object-cover border-8 border-gray-50">
                    </div>
                    <div class="w-full lg:w-1/2 flex flex-col justify-center">
                        <div class="mb-6">
                            <span class="bg-cyan-100 text-cyan-600 px-4 py-1 rounded-full text-xs font-black uppercase tracking-widest">Disponible</span>
                            <h2 class="text-5xl font-black text-gray-900 mt-2 tracking-tighter uppercase">${product.name}</h2>
                            <p class="text-gray-500 font-medium mt-2">Stock: <span id="modal-stock" class="text-gray-900">0</span> unidades</p>
                        </div>

                        <div class="flex gap-3 mb-8 bg-gray-100 p-1.5 rounded-2xl w-fit">
                            <button class="payment-mode-btn px-6 py-2.5 rounded-xl font-black text-xs transition-all duration-300" data-payment-mode="contado">CONTADO</button>
                            <button class="payment-mode-btn px-6 py-2.5 rounded-xl font-black text-xs transition-all duration-300" data-payment-mode="plazos">PLAZOS</button>
                        </div>

                        <div id="financing-options" class="hidden grid grid-cols-2 gap-4 mb-8 bg-gray-50 p-6 rounded-[2rem] border border-gray-200">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-gray-400 uppercase ml-1">Frecuencia</label>
                                <select id="pay-freq" class="w-full bg-white border-none rounded-xl p-3 text-sm font-bold shadow-sm outline-none">
                                    <option value="mensual">Mensual</option>
                                    <option value="quincenal">Quincenal</option>
                                    <option value="semanal">Semanal</option>
                                </select>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-gray-400 uppercase ml-1">Plazo</label>
                                <select id="pay-months" class="w-full bg-white border-none rounded-xl p-3 text-sm font-bold shadow-sm outline-none">
                                    <option value="3">3 Meses</option>
                                    <option value="6" selected>6 Meses</option>
                                    <option value="12">12 Meses</option>
                                </select>
                            </div>
                            <div class="col-span-2 bg-cyan-600 text-white p-4 rounded-2xl flex justify-between items-center shadow-lg shadow-cyan-200 mt-2">
                                <div>
                                    <p class="text-[10px] font-bold opacity-80 uppercase">Cuota Estimada</p>
                                    <p id="calc-cuota" class="text-2xl font-black">$0.00</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] font-bold opacity-80 uppercase">Total Pagos</p>
                                    <p id="calc-total-pagos" class="text-xl font-black">0</p>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-6 mb-8">
                            ${uniqueAlm.length > 1 ? `<div><p class="text-xs font-black text-gray-400 mb-3 uppercase tracking-widest">Capacidad</p><div class="flex gap-2">${uniqueAlm.map((a,i)=>`<button class="variant-opt-btn border-2 border-gray-100 px-5 py-2 rounded-xl font-bold text-sm hover:border-cyan-600 transition" data-type="alm" data-val="${a}" data-selected="${i===0}">${a}</button>`).join('')}</div></div>`:''}
                            ${uniqueCol.length > 1 ? `<div><p class="text-xs font-black text-gray-400 mb-3 uppercase tracking-widest">Color</p><div class="flex gap-2">${uniqueCol.map((c,i)=>`<button class="variant-opt-btn border-2 border-gray-100 px-5 py-2 rounded-xl font-bold text-sm hover:border-cyan-600 transition" data-type="col" data-val="${c}" data-selected="${i===0}">${c}</button>`).join('')}</div></div>`:''}
                        </div>

                        <div class="border-t pt-6 mb-8">
                            <p id="price-label" class="text-xs font-black text-gray-400 uppercase tracking-widest mb-1">Precio al Contado</p>
                            <div class="flex items-baseline gap-2">
                                <span id="modal-price" class="text-5xl font-black text-cyan-600 tracking-tighter">$0.00</span>
                                <span class="text-gray-400 font-bold text-sm">inc. IVA</span>
                            </div>
                        </div>

                        <div class="flex gap-4">
                            <div class="flex items-center bg-gray-100 rounded-2xl p-1">
                                <button id="qty-min" class="w-10 h-10 font-bold text-gray-500 hover:text-black">-</button>
                                <input id="qty-num" type="number" value="1" class="w-12 bg-transparent text-center font-black text-lg outline-none">
                                <button id="qty-plus" class="w-10 h-10 font-bold text-gray-500 hover:text-black">+</button>
                            </div>
                            <a id="wa-btn" href="#" target="_blank" class="flex-1 bg-green-500 text-white font-black py-4 rounded-2xl text-center hover:bg-green-600 transition shadow-xl shadow-green-100 flex items-center justify-center gap-2">
                                <i class="fab fa-whatsapp text-xl"></i> COMPRAR POR WHATSAPP
                            </a>
                        </div>
                    </div>
                </div>

                <div class="mt-16 border-t border-gray-100 pt-10">
                    <div class="flex gap-8 mb-6 border-b border-gray-100">
                        <button class="tab-btn pb-4 border-b-4 border-cyan-600 text-cyan-600 font-black uppercase tracking-widest text-sm" data-tab="desc">Descripción</button>
                        <button class="tab-btn pb-4 border-b-4 border-transparent text-gray-400 font-black uppercase tracking-widest text-sm" data-tab="specs">Ficha Técnica</button>
                    </div>
                    <div id="tab-pane" class="text-gray-500 font-medium leading-relaxed max-w-3xl">
                        ${product.longDescription}
                    </div>
                </div>
            `;

            setupModalLogic(product);
            document.getElementById('info-modal').classList.remove('hidden');
        }

        function setupModalLogic(product) {
            const updateUI = () => {
                const alm = document.querySelector('[data-type="alm"][data-selected="true"]')?.dataset.val || product.variants[0].almacenamiento;
                const col = document.querySelector('[data-type="col"][data-selected="true"]')?.dataset.val || product.variants[0].color;
                const qty = parseInt(document.getElementById('qty-num').value);
                
                const variant = product.variants.find(v => v.almacenamiento === alm && v.color === col) || product.variants[0];
                const basePrice = variant.costoProveedor * variant.margenContado;
                
                // Actualizar Stock
                document.getElementById('modal-stock').innerText = variant.stock;

                // Estilos de botones de modo
                document.querySelectorAll('.payment-mode-btn').forEach(b => {
                    const active = b.dataset.paymentMode === currentPaymentMode;
                    b.className = `payment-mode-btn px-6 py-2.5 rounded-xl font-black text-xs transition-all duration-300 ${active ? 'bg-cyan-600 text-white shadow-lg shadow-cyan-100' : 'bg-transparent text-gray-500 hover:bg-gray-200'}`;
                });

                const priceLabel = document.getElementById('price-label');
                const finArea = document.getElementById('financing-options');
                let waMsg = "";

                if (currentPaymentMode === 'contado') {
                    finArea.classList.add('hidden');
                    priceLabel.innerText = "Precio al Contado";
                    const total = (basePrice * qty).toFixed(2);
                    document.getElementById('modal-price').innerText = `$${total}`;
                    waMsg = `Hola! Quiero comprar de contado ${qty} ${product.name} (${alm}). Total: $${total}`;
                } else {
                    finArea.classList.remove('hidden');
                    priceLabel.innerText = "Total Financiado";
                    const months = document.getElementById('pay-months').value;
                    const freq = document.getElementById('pay-freq').value;
                    const calc = calculatePayment(basePrice * qty, months, freq, variant.tasaAnual);
                    
                    document.getElementById('modal-price').innerText = `$${calc.totalAmountDue}`;
                    document.getElementById('calc-cuota').innerText = `$${calc.installmentAmount}`;
                    document.getElementById('calc-total-pagos').innerText = calc.totalPayments;
                    waMsg = `Hola! Me interesa financiar ${qty} ${product.name} (${alm}) a ${months} meses. Pago ${freq}.`;
                }
                document.getElementById('wa-btn').href = `https://wa.me/593967427594?text=${encodeURIComponent(waMsg)}`;
            };

            // Eventos
            document.querySelectorAll('.payment-mode-btn').forEach(b => b.onclick = (e) => { currentPaymentMode = e.target.dataset.paymentMode; updateUI(); });
            document.querySelectorAll('.variant-opt-btn').forEach(b => b.onclick = (e) => {
                document.querySelectorAll(`[data-type="${e.target.dataset.type}"]`).forEach(btn => {
                    btn.dataset.selected = "false";
                    btn.classList.remove('border-cyan-600', 'bg-cyan-50', 'text-cyan-600');
                });
                e.target.dataset.selected = "true";
                e.target.classList.add('border-cyan-600', 'bg-cyan-50', 'text-cyan-600');
                updateUI();
            });

            document.getElementById('qty-plus').onclick = () => { document.getElementById('qty-num').value++; updateUI(); };
            document.getElementById('qty-min').onclick = () => { if(document.getElementById('qty-num').value > 1) { document.getElementById('qty-num').value--; updateUI(); } };
            document.getElementById('pay-freq').onchange = updateUI;
            document.getElementById('pay-months').onchange = updateUI;

            // Pestañas
            document.querySelectorAll('.tab-btn').forEach(btn => btn.onclick = (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.classList.remove('border-cyan-600', 'text-cyan-600');
                    b.classList.add('border-transparent', 'text-gray-400');
                });
                e.target.classList.add('border-cyan-600', 'text-cyan-600');
                e.target.classList.remove('border-transparent', 'text-gray-400');
                document.getElementById('tab-pane').innerHTML = e.target.dataset.tab === 'desc' ? product.longDescription : `<ul class="list-disc ml-5 space-y-2">${product.specs.map(s=>`<li>${s}</li>`).join('')}</ul>`;
            });

            updateUI();
        }

        // Navegación General
        function showPage(id) {
            document.querySelectorAll('.content-page').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('mobile-menu').classList.add('hidden');
            window.scrollTo(0,0);
        }

        document.getElementById('btn-inicio').onclick = () => showPage('page-inicio');
        document.getElementById('m-btn-inicio').onclick = () => showPage('page-inicio');
        document.getElementById('btn-catalogo').onclick = () => showPage('page-catalogo');
        document.getElementById('m-btn-catalogo').onclick = () => showPage('page-catalogo');
        document.getElementById('btn-ir-catalogo').onclick = () => showPage('page-catalogo');
        document.getElementById('btn-contacto').onclick = () => showPage('page-contacto');
        document.getElementById('menu-toggle').onclick = () => document.getElementById('mobile-menu').classList.toggle('hidden');
        document.getElementById('close-modal').onclick = () => document.getElementById('info-modal').classList.add('hidden');

        document.addEventListener('DOMContentLoaded', () => {
            renderProducts(products);
        });
    </script>
</body>
</html>
